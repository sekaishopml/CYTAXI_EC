version: "3.9"

services:
  nginx:
    image: nginx:alpine
    ports: ["80:80"]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [gateway, travel, driver-web, dashboard, swagger]
    restart: unless-stopped
    networks: [cytaxi_net]

  gateway:
    build: ./backend/gateway
    environment: { GATEWAY_PORT: "8000", APP_ENV: "beta", LOG_LEVEL: "debug", GATEWAY_RATE_LIMIT_RPS: "100" }
    networks: [cytaxi_net]
    restart: unless-stopped

  travel:
    build:
      context: ./frontend/travel
      dockerfile: Dockerfile
    environment: { NEXT_PUBLIC_GATEWAY_URL: "http://64.176.219.221", PORT: "3000" }
    networks: [cytaxi_net]
    restart: unless-stopped

  driver-web:
    build:
      context: ./frontend/driver-web
      dockerfile: Dockerfile
    environment: { NEXT_PUBLIC_GATEWAY_URL: "http://64.176.219.221", PORT: "3001" }
    networks: [cytaxi_net]
    restart: unless-stopped

  dashboard:
    build:
      context: ./frontend/dashboard
      dockerfile: Dockerfile
    environment: { NEXT_PUBLIC_GATEWAY_URL: "http://64.176.219.221", PORT: "3002" }
    networks: [cytaxi_net]
    restart: unless-stopped

  swagger:
    build:
      context: ./nginx/swagger
      dockerfile: Dockerfile
    networks: [cytaxi_net]
    restart: unless-stopped

  trip:
    build: ./backend/engines/trip
    environment: { TRIP_PORT: "8087", APP_ENV: "beta", LOG_LEVEL: "debug" }
    networks: [cytaxi_net]
    restart: unless-stopped

  pricing:
    build: ./backend/engines/pricing
    environment: { PRICING_PORT: "8088", APP_ENV: "beta" }
    networks: [cytaxi_net]
    restart: unless-stopped

  payment:
    build: ./backend/engines/payment
    environment: { PAYMENT_PORT: "8091", APP_ENV: "beta" }
    networks: [cytaxi_net]
    restart: unless-stopped

  customer:
    build: ./backend/engines/customer
    environment: { CUSTOMER_PORT: "8085", APP_ENV: "beta" }
    networks: [cytaxi_net]
    restart: unless-stopped

  driver:
    build: ./backend/engines/driver
    environment: { DRIVER_PORT: "8086", APP_ENV: "beta" }
    networks: [cytaxi_net]
    restart: unless-stopped

  notification:
    build: ./backend/engines/notification
    environment: { NOTIFICATION_PORT: "8090", APP_ENV: "beta" }
    networks: [cytaxi_net]
    restart: unless-stopped

  matching:
    build: ./backend/engines/matching
    environment: { MATCHING_PORT: "8089", APP_ENV: "beta" }
    networks: [cytaxi_net]
    restart: unless-stopped

  admin:
    build: ./backend/engines/admin
    environment: { ADMIN_PORT: "8094", APP_ENV: "beta" }
    networks: [cytaxi_net]
    restart: unless-stopped

  analytics:
    build: ./backend/engines/analytics
    environment: { ANALYTICS_PORT: "8093", APP_ENV: "beta" }
    networks: [cytaxi_net]
    restart: unless-stopped

  trust:
    build: ./backend/engines/trust
    environment: { TRUST_PORT: "8092", APP_ENV: "beta" }
    networks: [cytaxi_net]
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment: { POSTGRES_USER: "cytaxi", POSTGRES_PASSWORD: "cytaxi_beta_2026", POSTGRES_DB: "cytaxi" }
    networks: [cytaxi_net]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    networks: [cytaxi_net]
    restart: unless-stopped

networks:
  cytaxi_net:
    driver: bridge
