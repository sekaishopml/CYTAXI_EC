name: CYTAXI CI/CD

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

env:
  GO_VERSION: "1.22"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "${{ env.GO_VERSION }}" }
      - run: go work sync
      - uses: golangci/golangci-lint-action@v4
        with: { version: latest, working-directory: backend }

  test:
    runs-on: ubuntu-latest
    needs: [lint]
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_USER: cytaxi, POSTGRES_PASSWORD: cytaxi, POSTGRES_DB: cytaxi_test }
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 5s --health-timeout 3s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "${{ env.GO_VERSION }}" }
      - run: go work sync
      - run: go test ./... -race -coverprofile=coverage.out -covermode=atomic
        working-directory: backend
      - uses: codecov/codecov-action@v4
        with: { files: backend/coverage.out, flags: unittests }

  build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t cytaxi-gateway ./backend/gateway
      - run: docker build -t cytaxi-trip ./backend/engines/trip
      - run: docker build -t cytaxi-pricing ./backend/engines/pricing
      - run: docker build -t cytaxi-payment ./backend/engines/payment
      - run: docker build -t cytaxi-customer ./backend/engines/customer
      - run: docker build -t cytaxi-driver ./backend/engines/driver

  security:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with: { scan-type: "fs", scan-ref: ".", severity: "CRITICAL,HIGH", exit-code: "1" }

  deploy:
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [security]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f docker-compose.prod.yml build
      - name: Deploy
        run: echo "Deployment ready. Manual trigger required for production."
