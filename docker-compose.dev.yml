version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: cytaxi-postgres
    environment:
      POSTGRES_USER: cytaxi
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: cytaxi_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cytaxi"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cytaxi-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
