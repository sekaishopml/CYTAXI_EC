version: "3.9"

services:
  nginx:
    image: nginx:alpine
    ports: ["80:80"]
    volumes: [./nginx/nginx.conf:/etc/nginx/nginx.conf:ro]
    depends_on: [gateway]
    restart: unless-stopped
    networks: [public_net, private_net]
    healthcheck: { test: ["CMD", "wget", "-qO-", "http://localhost/health"], interval: "10s", retries: 3 }

  gateway:
    build: { context: ., dockerfile: Dockerfile.engine, args: { ENGINE: "gateway" } }
    environment: { GATEWAY_PORT: "8000", APP_ENV: "production", LOG_LEVEL: "warn" }
    restart: unless-stopped
    networks: [private_net]
    healthcheck: { test: ["CMD", "wget", "-qO-", "http://localhost:8000/api/v1/health"], interval: "10s", retries: 3 }

  trip:
    build: { context: ., dockerfile: Dockerfile.engine, args: { ENGINE: "trip" } }
    environment: { TRIP_PORT: "8087", APP_ENV: "production" }
    restart: unless-stopped
    networks: [private_net]
    depends_on: [postgres, redis]

  pricing:
    build: { context: ., dockerfile: Dockerfile.engine, args: { ENGINE: "pricing" } }
    environment: { PRICING_PORT: "8088", APP_ENV: "production" }
    restart: unless-stopped
    networks: [private_net]

  payment:
    build: { context: ., dockerfile: Dockerfile.engine, args: { ENGINE: "payment" } }
    environment: { PAYMENT_PORT: "8091", APP_ENV: "production" }
    restart: unless-stopped
    networks: [private_net]

  matching:
    build: { context: ., dockerfile: Dockerfile.engine, args: { ENGINE: "matching" } }
    environment: { MATCHING_PORT: "8089", APP_ENV: "production" }
    restart: unless-stopped
    networks: [private_net]

  customer:
    build: { context: ., dockerfile: Dockerfile.engine, args: { ENGINE: "customer" } }
    environment: { CUSTOMER_PORT: "8085", APP_ENV: "production" }
    restart: unless-stopped
    networks: [private_net]

  driver:
    build: { context: ., dockerfile: Dockerfile.engine, args: { ENGINE: "driver" } }
    environment: { DRIVER_PORT: "8086", APP_ENV: "production" }
    restart: unless-stopped
    networks: [private_net]

  notification:
    build: { context: ., dockerfile: Dockerfile.engine, args: { ENGINE: "notification" } }
    environment: { NOTIFICATION_PORT: "8090", APP_ENV: "production" }
    restart: unless-stopped
    networks: [private_net]

  postgres:
    image: postgres:16-alpine
    environment: { POSTGRES_USER: "cytaxi", POSTGRES_PASSWORD: "${DB_PASSWORD}", POSTGRES_DB: "cytaxi" }
    volumes: [postgres_data:/var/lib/postgresql/data]
    restart: unless-stopped
    networks: [private_net]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U cytaxi"], interval: "5s", retries: 5 }

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [private_net]
    healthcheck: { test: ["CMD", "redis-cli", "ping"], interval: "5s", retries: 5 }

  prometheus:
    image: prom/prometheus:latest
    volumes: [./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml]
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    restart: unless-stopped
    networks: [private_net]

  grafana:
    image: grafana/grafana:latest
    environment: { GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-admin}" }
    volumes: [./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards]
    restart: unless-stopped
    depends_on: [prometheus]
    networks: [private_net]

networks:
  public_net:
    driver: bridge
  private_net:
    driver: bridge
    internal: true

volumes:
  postgres_data:
