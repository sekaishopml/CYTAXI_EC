# CYTAXI — nginx reference configuration (PRODUCTION: sekaishopec.com)
#
# IMPORTANT: This file documents the production routing used by the VM at
# /etc/nginx/nginx.conf + /etc/nginx/sites-available/wildcard.sekaishopec.com.conf.
# The live config routes by SUBDOMAIN (not by path). Keep both in sync.
#
# Subdomain -> upstream port mapping (see map $subdomain $upstream_port below):
#   travel.sekaishopec.com   -> 3000  (Next.js client app)
#   driver.sekaishopec.com   -> 3002  (Next.js driver portal)
#   admin.sekaishopec.com    -> 3003  (Next.js admin dashboard)
#   api.sekaishopec.com      -> 8000  (Go API gateway)
#   status.sekaishopec.com   -> 3001  (status page, not deployed yet)
#   bot.sekaishopec.com      -> 3004  (whatsapp bot, not deployed yet)
#   opencode.sekaishopec.com -> 4096  (this tool)
#
# Backend engines run behind the gateway (default upstreams):
#   trip 8087, pricing 8088, matching 8089, geospatial 8082, etc.

worker_processes auto;

events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # CORS / WebSocket upgrade helper
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Subdomain -> upstream port
    map $host $subdomain {
        ~^(?<sub>[^.]+)\.sekaishopec\.com$  $sub;
        default                            travel;
    }
    map $subdomain $upstream_port {
        default  3000;
        travel   3000;
        api      8000;
        status   3001;
        driver   3002;
        admin    3003;
        bot      3004;
        opencode 4096;
    }
    map $subdomain $is_nextjs {
        default  0;
        travel   1;
        driver   1;
        admin    1;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name sekaishopec.com *.sekaishopec.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name sekaishopec.com *.sekaishopec.com;

        # SSL / security / proxy snippets live in /etc/nginx/snippets on the VM
        include /etc/nginx/snippets/ssl.conf;
        include /etc/nginx/snippets/security.conf;
        include /etc/nginx/snippets/proxy.conf;

        # Per-subdomain log name
        access_log /var/log/nginx/$subdomain.access.log main;
        error_log  /var/log/nginx/$subdomain.error.log warn;

        set $backend "127.0.0.1:$upstream_port";

        # Health check (all subdomains)
        location /health {
            add_header Content-Type application/json;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            return 200 "{\"status\":\"ok\",\"service\":\"$subdomain\"}";
        }

        # Next.js static assets — long cache (only for Next.js subdomains)
        location /_next/static/ {
            proxy_pass http://$backend;
            proxy_set_header Host $host;
            expires 365d;
            add_header Cache-Control "public, immutable, max-age=31536000";
            access_log off;
        }
        location /_next/image {
            proxy_pass http://$backend;
            proxy_set_header Host $host;
        }

        # API subdomain — no cache + CORS
        location /api/ {
            proxy_pass http://$backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Cache-Control "no-cache, no-store, must-revalidate, private";
            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }

        # WebSocket endpoints (driver, bot)
        location /ws/ {
            proxy_pass http://$backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;
            proxy_send_header X-Real-IP $remote_addr;
            proxy_cache off;
        }

        # Catch-all — dynamic backend (Next.js apps, gateway, etc.)
        # DEV NOTE: in development, Cloudflare Cache Rule bypasses caching for
        # all sekaishopec.com subdomains so frontend changes are instant.
        location / {
            proxy_pass http://$backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_redirect off;
        }
    }
}
