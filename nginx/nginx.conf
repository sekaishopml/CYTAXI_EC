worker_processes 1;

events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format json escape=json '{"time":"$time_iso8601","remote":"$remote_addr",'
        '"method":"$request_method","path":"$uri","status":$status,'
        '"bytes":$body_bytes_sent,"rt":"$request_time","ref":"$http_referer",'
        '"ua":"$http_user_agent","correlation":"$http_x_correlation_id"}';

    access_log /var/log/nginx/access.log json;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # API Gateway
    upstream api_gateway { server gateway:8000; }
    # Frontends
    upstream miniweb { server miniweb:3000; }
    upstream driver_web { server driver-web:3001; }
    upstream dashboard { server dashboard:3002; }
    upstream swagger_ui { server swagger:8081; }

    server {
        listen 80;
        server_name 64.176.219.221 _;

        client_max_body_size 20M;

        # Health endpoint
        location /health {
            proxy_pass http://api_gateway/health;
            proxy_set_header Host $host;
        }

        # API Gateway
        location /api/ {
            proxy_pass http://api_gateway/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Admin Dashboard
        location /admin {
            proxy_pass http://dashboard/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Driver Web Portal
        location /driver {
            proxy_pass http://driver_web/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # API Documentation (Swagger)
        location /docs {
            proxy_pass http://swagger_ui/;
            proxy_set_header Host $host;
        }

        # Dashboard internal routes
        location /_next/ {
            proxy_pass http://miniweb/_next/;
            proxy_set_header Host $host;
        }

        # MiniWeb (catch-all - must be last)
        location / {
            proxy_pass http://miniweb/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
