worker_processes auto;
pid /run/nginx.pid;
events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    log_format json escape=json '{"time":"$time_iso8601","remote":"$remote_addr","method":"$request_method","path":"$uri","status":$status,"rt":"$request_time"}';
    access_log /var/log/nginx/access.log json;
    error_log /var/log/nginx/error.log warn;

    server {
        listen 80;
        server_name 64.176.219.221;

        client_max_body_size 20M;

        # Root landing page
        location = / {
            root /var/www/cytaxi;
            index index.html;
        }

        # Health
        location = /health {
            add_header Content-Type application/json;
            return 200 '{"status":"ok","service":"cytaxi-beta","version":"1.0.0-rc1","ip":"64.176.219.221"}';
        }

        location = /api/v1/health {
            add_header Content-Type application/json;
            return 200 '{"status":"ok","service":"api-gateway","version":"1.0.0-rc1"}';
        }

        # Proxy to Docker containers if running
        location /api/ {
            proxy_pass http://127.0.0.1:8000/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_connect_timeout 5s;
            proxy_next_upstream error timeout http_502 http_503;
        }

        # Static pages for frontends
        location = /customer { alias /var/www/cytaxi/customer.html; }
        location = /driver { alias /var/www/cytaxi/driver.html; }
        location = /admin { alias /var/www/cytaxi/admin.html; }
        location = /docs { alias /var/www/cytaxi/docs.html; }
    }
}
