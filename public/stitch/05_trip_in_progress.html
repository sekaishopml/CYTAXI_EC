<script>
        // Simple script to duplicate mobile trip details to desktop sidebar for this demo layout
        document.addEventListener('DOMContentLoaded', () => {
            const mobileDetails = document.querySelector('.mt-auto.pointer-events-auto').cloneNode(true);
            // Remove mobile-specific classes from cloned node
            mobileDetails.classList.remove('md:w-[420px]', 'md:absolute', 'shadow-[0_-8px_30px_rgba(0,0,0,0.1)]');
            mobileDetails.classList.add('shadow-none', 'border-none', 'p-0', 'bg-transparent');
            document.getElementById('desktop-trip-details').appendChild(mobileDetails);
        });
